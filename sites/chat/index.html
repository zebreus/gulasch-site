<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gulasch Chat</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111318;
      --panel: #1b1f2a;
      --panel-strong: #252b39;
      --text: #f5f7fb;
      --muted: #a9b1c3;
      --accent: #ff7a45;
      --accent-strong: #ff5a1f;
      --bubble: #2a3040;
      --bubble-user: #ff7a45;
      --shadow: 0 24px 80px rgb(0 0 0 / 35%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgb(255 122 69 / 22%), transparent 34rem),
        radial-gradient(circle at bottom right, rgb(91 123 255 / 18%), transparent 28rem),
        var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .chat {
      width: min(920px, 100%);
      height: min(760px, calc(100vh - 48px));
      background: rgb(27 31 42 / 86%);
      border: 1px solid rgb(255 255 255 / 10%);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
      backdrop-filter: blur(18px);
    }

    header {
      padding: 22px 24px;
      border-bottom: 1px solid rgb(255 255 255 / 8%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      letter-spacing: -0.04em;
    }

    .status {
      color: var(--muted);
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .status::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #6dff9a;
      box-shadow: 0 0 18px #6dff9a;
    }

    .messages {
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .message {
      max-width: min(72%, 620px);
      padding: 13px 15px;
      border-radius: 18px;
      background: var(--bubble);
      color: var(--text);
      line-height: 1.45;
      word-wrap: break-word;
    }

    .message small {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 0.76rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .message.user {
      align-self: flex-end;
      background: var(--bubble-user);
      color: #1d110c;
    }

    .message.user small {
      color: rgb(29 17 12 / 65%);
    }

    form {
      padding: 18px;
      border-top: 1px solid rgb(255 255 255 / 8%);
      display: flex;
      gap: 12px;
      background: rgb(17 19 24 / 42%);
    }

    input {
      width: 100%;
      border: 1px solid rgb(255 255 255 / 10%);
      background: var(--panel-strong);
      color: var(--text);
      border-radius: 16px;
      padding: 15px 16px;
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: rgb(255 122 69 / 76%);
      box-shadow: 0 0 0 4px rgb(255 122 69 / 14%);
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 0 22px;
      background: var(--accent);
      color: #1d110c;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover,
    button:focus-visible {
      background: var(--accent-strong);
    }

    @media (max-width: 640px) {
      body {
        padding: 0;
      }

      .chat {
        height: 100vh;
        border-radius: 0;
      }

      header,
      .messages {
        padding: 18px;
      }

      .status {
        font-size: 0;
      }

      form {
        padding: 12px;
      }

      button {
        padding: 0 16px;
      }

      .message {
        max-width: 86%;
      }
    }
  </style>
</head>
<body>
  <main class="chat" aria-label="Gulasch chat interface">
    <header>
      <div>
        <h1>Gulasch Chat</h1>
      </div>
      <span class="status">Online</span>
    </header>

    <section class="messages" id="messages" aria-live="polite"></section>

    <form id="chat-form">
      <input id="chat-input" name="message" autocomplete="off" maxlength="500" placeholder="Type a message..." aria-label="Message" required>
      <button type="submit">Send</button>
    </form>
  </main>

  <script>
    const messages = document.querySelector('#messages');
    const form = document.querySelector('#chat-form');
    const input = document.querySelector('#chat-input');
    const storageKey = 'gulasch-chat-messages';

    const savedMessages = JSON.parse(localStorage.getItem(storageKey) || '[]');
    const initialMessages = savedMessages.length ? savedMessages : [
      { author: 'Gulasch Bot', text: 'Welcome to chat.gulasch.site. This is a simple local chat interface.' }
    ];

    function save() {
      const data = [...messages.querySelectorAll('.message')].map((message) => ({
        author: message.dataset.author,
        text: message.querySelector('span').textContent
      }));
      localStorage.setItem(storageKey, JSON.stringify(data));
    }

    function addMessage(author, text, isUser = false) {
      const message = document.createElement('article');
      message.className = isUser ? 'message user' : 'message';
      message.dataset.author = author;
      message.innerHTML = `<small></small><span></span>`;
      message.querySelector('small').textContent = author;
      message.querySelector('span').textContent = text;
      messages.append(message);
      messages.scrollTop = messages.scrollHeight;
      save();
    }

    initialMessages.forEach((message) => addMessage(message.author, message.text, message.author === 'You'));

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const text = input.value.trim();

      if (!text) {
        return;
      }

      addMessage('You', text, true);
      input.value = '';

      window.setTimeout(() => {
        addMessage('Gulasch Bot', 'Message received. A real backend can be connected here next.');
      }, 450);
    });
  </script>
</body>
</html>
